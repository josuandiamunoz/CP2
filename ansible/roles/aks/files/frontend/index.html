<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Básico</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .container {
            text-align: center;
        }
        .contador {
            font-size: 3em;
            margin-bottom: 20px;
        }
        button {
            font-size: 1.2em;
            padding: 10px 20px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="contador" id="contador">0</div>
        <button id="btn-incrementar" onclick="incrementarContador()">Incrementar</button>
    </div>

    <script>
        const URL_API = "http://backend-service/actualizar";
        let contador = 0;

        async function incrementarContador() {
            const boton = document.getElementById('btn-incrementar');
            const display = document.getElementById('contador');

            try {
                boton.disabled = true;
                const respuesta = await fetch(URL_API, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ valor: 1 }) // Le decimos que sume 1
                });
                if (!respuesta.ok) throw new Error('Error en el servidor');
                const datos = await respuesta.json();
                display.textContent = datos.nuevo_total;

            } catch (error) {
                console.error("Error:", error);
                alert("No se pudo conectar con el backend. ¿Has configurado la IP correcta?");
            } finally {
                boton.disabled = false;
            }
        }
    </script>

</body>
</html>
