---
# tasks file for roles/vm
- name: Instalar Podman
  become: yes
  apt:
    name: podman
    state: present
    update_cache: yes
    
- name: Login en ACR usando podman_login
  containers.podman.podman_login:
    username: 00000000-0000-0000-0000-000000000000
    password: "{{ acr_access_token }}"
    registry: "{{ acr_login_server }}"
    
- name: Descargar imagen desde ACR
  containers.podman.podman_image:
    name: "{{ acr_login_server }}/{{ image_name }}:{{ new_tag }}"
    state: present
    
- name: Ejecutar contenedor Nginx desde la imagen descargada
  containers.podman.podman_container:
    name: nginx-container
    image: "{{ acr_login_server }}/{{ image_name }}:{{ new_tag }}"
    state: started
    ports:
      - "8080:80"  # Mapea el puerto 80 del contenedor al puerto 80 de la máquina virtual
   
