---
- name: Setup ACR and images
  hosts: localhost
  roles:
  - acr
  
- name: Setup Webserver
  hosts: webapp
  vars:
    acr_access_token: "{{ hostvars['localhost']['acr_access_token'] }}"
  roles:
  - vm
  
- name: Setup AKS
  hosts: localhost
  vars:
    acr_access_token: "{{ hostvars['localhost']['acr_access_token'] }}"
  roles:
  - aks
  
 

